            if (showAllBtn) {
                showAllBtn.style.display = 'inline-block';
            }
            
            // Render the filtered word list directly in the main panel
            renderWordList(dateStr);
            
            // Scroll to word list smoothly
            const wordListEl = document.getElementById('wordList');
            if (wordListEl) {
                wordListEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // Render modal words (for refresh after delete)
        function renderModalWords(dateStr) {
            const modalWordList = document.getElementById('modalWordList');
            const filteredWords = words.filter(w => w.date === dateStr);
            
            if (filteredWords.length === 0) {
                modalWordList.innerHTML = '<div class="empty-state"><p>這天沒有記錄單詞</p></div>';
            } else {
                modalWordList.innerHTML = filteredWords.map(word => {
                    let html = '<div class="word-item">';
                    
                    if (word.english) {
                        html += `
                            <div class="english" onclick="speakEnglish('${escapeJs(word.english)}')" style="cursor: pointer;">
                                <span class="speaker-icon">🔊</span>
                                <span>${escapeHtml(word.english)}</span>
                            </div>
                        `;
                    }
                    
                    // Display translation if available (either customTranslation or chinese)
                    const displayText = word.customTranslation || word.chinese;
                    if (displayText) {
                        const showStrokeOrder = !word.english && word.chinese;
                        const chineseId = `modal-chinese-${word.id}`;
                        const containerId = `modal-stroke-${word.id}`;
                        
                        html += `
                            <div class="chinese" style="display: flex; align-items: center; gap: 8px; margin-top: 5px;">
                                <span style="cursor: pointer; font-size: 1.2em;" onclick="speakCantonese('${escapeJs(displayText)}'); event.stopPropagation();">🔊</span>
                                <span style="cursor: pointer;" onclick="speakCantonese('${escapeJs(displayText)}'); event.stopPropagation();">${escapeHtml(displayText)}</span>
                            </div>
                        `;
                        
                        if (showStrokeOrder) {
                            html += `
                                <button type="button" 
                                        onclick="showAndPlayStrokeOrder('${containerId}', '${chineseId}', '${escapeJs(word.chinese.charAt(0))}')" 
                                        style="margin-top: 8px; padding: 6px 12px; background: #f0f4ff; border: none; border-radius: 4px; cursor: pointer; color: #667eea; font-size: 0.85em; display: flex; align-items: center; gap: 5px;">
                                    📝 筆順
                                </button>
                                <div id="${containerId}" class="stroke-order-container" style="display: none;">
                                    <div class="stroke-order-title">筆畫順序：</div>
                                    <div id="${chineseId}" class="hanzi-writer-target"></div>
                                </div>
                            `;
                        }
                    }
                    
                    html += `
                        <button class="delete-btn" onclick="deleteWord(${word.id}); renderModalWords('${dateStr}');">刪除</button>
                    </div>
                    `;
                    
                    return html;
                }).join('');
            }
        }

        // Add "Show All" button functionality
        function showAllWords() {
            // Reset calendar title
            const calendarTitle = document.querySelector('.fc-toolbar-title');
            if (calendarTitle) {
                calendarTitle.textContent = '月曆';
            }
            
            // Hide "Show All" button
            const showAllBtn = document.getElementById('showAllBtn');
            if (showAllBtn) {
                showAllBtn.style.display = 'none';
            }
            
            renderWordList();
        }

        // Delete word
        function deleteWord(id) {
            if (confirm('確定要刪除這個單詞嗎？')) {
                words = words.filter(w => w.id !== id);
                saveWords();
                renderWordList();
                updateStats();
                updateCalendarEvents();
                
                // Refresh modal if open
                const modal = document.getElementById('wordModal');
                if (modal.classList.contains('active')) {
                    const modalTitle = document.getElementById('modalTitle').textContent;
                    const dateMatch = modalTitle.match(/(\d{4}-\d{2}-\d{2})/);
                    if (dateMatch) {
                        renderModalWords(dateMatch[1]);
                    }
                }
            }
        }

        // Update statistics
        function updateStats() {
            const totalWords = words.length;
            
            const today = new Date().toISOString().split('T')[0];
            const todayWordsCount = words.filter(w => w.date === today).length;
            
            const uniqueDays = new Set(words.map(w => w.date)).size;
            
            document.getElementById('totalWords').textContent = totalWords;
            document.getElementById('todayWords').textContent = todayWordsCount;
            document.getElementById('totalDays').textContent = uniqueDays;
        }

        // Helper: Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Helper: Escape JavaScript strings
        function escapeJs(text) {
            return text.replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n');
        }

        // Helper: Format date
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}年${month}月${day}日`;
        }

        // Toggle date picker
        function toggleDatePicker() {
            const popup = document.getElementById('datePickerPopup');
            popup.classList.toggle('active');
        }

        // Close date picker
        function closeDatePicker() {
            const popup = document.getElementById('datePickerPopup');
            popup.classList.remove('active');
        }

        // Select quick date
        function selectQuickDate(type) {
            const date = new Date();
            
            if (type === 'yesterday') {
                date.setDate(date.getDate() - 1);
            } else if (type === 'tomorrow') {
                date.setDate(date.getDate() + 1);
            }
            
            // Format as local date string (YYYY-MM-DD)
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const dateStr = `${year}-${month}-${day}`;
            
            document.getElementById('wordDate').value = dateStr;
            updateDateDisplay(dateStr);
            closeDatePicker();
        }

        // Update date display
        function updateDateDisplay(dateStr) {
            const displayEl = document.getElementById('dateDisplayText');
            if (dateStr) {
                displayEl.textContent = '📅 ' + formatDate(dateStr);
            } else {
                displayEl.textContent = '📅 選擇日期';
            }
        }

        // Listen to date input change
        document.getElementById('wordDate').addEventListener('change', function() {
            updateDateDisplay(this.value);
            closeDatePicker();
        });

        // Initialize Hanzi Writer for stroke order animation
        function initHanziWriter(elementId, chineseChar, containerId) {
            const loadingEl = document.getElementById(`${containerId}-loading`);
            const targetEl = document.getElementById(elementId);
            
            console.log('Initializing HanziWriter for:', chineseChar, 'element:', elementId);
            console.log('HanziWriter available:', typeof HanziWriter !== 'undefined');
            
            if (typeof HanziWriter === 'undefined') {
                console.error('HanziWriter library not loaded!');
                if (loadingEl) {
                    loadingEl.innerHTML = '<div class="stroke-error">⚠️ 筆畫庫未加載<br><small>請檢查網絡連接</small></div>';
                }
                return;
            }
            
            if (!chineseChar) {
                console.warn('No Chinese character provided');
                return;
            }
            
            try {
                console.log('Creating HanziWriter instance...');
                
                // Clear any existing content in the target element
                if (targetEl) {
                    targetEl.innerHTML = '';
                }
                
                const writer = HanziWriter.create(elementId, chineseChar, {
                    width: 120,
                    height: 120,
                    padding: 5,
                    showOutline: true,
                    strokeAnimationSpeed: 1,
                    delayBetweenStrokes: 200,
                    radicalColor: '#168F16',
                    outlineColor: '#ddd',
                    strokeColor: '#667eea'
                });
                
                console.log('HanziWriter instance created successfully');
                
                // Auto-animate the character after creation
                setTimeout(() => {
                    if (writer && typeof writer.animateCharacter === 'function') {
                        console.log('Starting character animation...');
                        writer.animateCharacter();
                    }
                }, 300);
                
                // Hide loading indicator after successful creation
                setTimeout(() => {
                    if (loadingEl) {
                        loadingEl.style.display = 'none';
                        console.log('Loading indicator hidden');
                    }
                }, 500);
                
            } catch (e) {
                console.error('Error creating HanziWriter:', e);
                if (loadingEl) {
                    loadingEl.innerHTML = '<div class="stroke-error">⚠️ 筆畫加載失敗<br><small>' + e.message + '</small></div>';
                }
            }
        }

        // Show and play stroke order animation
        function showAndPlayStrokeOrder(containerId, chineseId, chineseChar) {
            const container = document.getElementById(containerId);
            
            if (!container) return;
            
            // If already visible, hide it
            if (container.style.display === 'block') {
                container.style.display = 'none';
                return;
            }
            
            // Show the container
            container.style.display = 'block';
            
            // Initialize and play the animation
            setTimeout(() => {
                initHanziWriter(chineseId, chineseChar, containerId);
            }, 100);
        }

        // Toggle stroke order display
        function toggleStrokeOrder(containerId) {
            const container = document.getElementById(containerId);
            if (container) {
                const isHidden = container.style.display === 'none';
                container.style.display = isHidden ? 'block' : 'none';
            }
        }

        // Toggle word examples display
        async function toggleWordExamples(containerId, btnId, word) {
            const container = document.getElementById(containerId);
            const button = document.getElementById(btnId);
            
            if (!container || !button) return;
            
            const isHidden = container.style.display === 'none';
            
            if (isHidden) {
                // Show examples
                container.style.display = 'block';
                button.textContent = '📖 隱藏例句';
                
                // Get saved word data
                const savedWord = words.find(w => w.english === word);
                const customExamples = savedWord?.customExamples || [];
                
                // If word has custom examples, show them directly without fetching API
                if (customExamples.length > 0) {
                    displaySavedExamples(container, savedWord, customExamples);
                } else {
                    // No custom examples, fetch from API
                    container.innerHTML = '<div class="loading-examples">🔄 正在加載例句和翻譯...</div>';
                    
                    // Fetch and display examples with translations
                    const examples = await fetchExampleSentences(word);
                    displaySavedExamples(container, savedWord, customExamples, examples);
                }
            } else {
                // Hide examples
                container.style.display = 'none';
                button.textContent = '📖 查看例句';
            }
        }

        // Display saved/custom examples
        async function displaySavedExamples(container, savedWord, customExamples, apiExamples = []) {
            let allExamples = [];
            
            // Add custom examples first
            customExamples.forEach((example, idx) => {
                allExamples.push({
                    en: example.en,
                    zh: example.zh,
                    isCustom: true,
                    index: idx,
                    fromAPI: example.fromAPI
                });
            });
            
            // Add API examples only if requested or no custom examples
            if (apiExamples.length > 0 && customExamples.length === 0) {
                const examplesWithTranslations = await Promise.all(
                    apiExamples.map(async (sentence) => {
                        const translation = await translateToChinese(sentence);
                        return { en: sentence, zh: translation, isCustom: false };
                    })
                );
                
                allExamples = [...allExamples, ...examplesWithTranslations];
            }
            
            if (allExamples.length > 0) {
                let html = `
                    <div class="example-sentence-container">
                        ${savedWord?.english ? `
                            <div style="margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #eee;">
                                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                                    <strong style="font-size: 1.1em; color: #667eea;">${escapeHtml(savedWord.english)}</strong>
                                    <button type="button" onclick="addCustomTranslation(${savedWord.id})" 
                                            style="padding: 4px 10px; background: #f0f4ff; border: none; border-radius: 4px; cursor: pointer; color: #667eea; font-size: 0.85em;">
                                        ✏️ 編輯翻譯
                                    </button>
                                </div>
                                ${savedWord.customTranslation ? `
                                    <div style="color: #666; font-size: 0.95em;">
                                        🔊 ${escapeHtml(savedWord.customTranslation)}
                                    </div>
                                ` : `
                                    <div style="color: #999; font-size: 0.9em; font-style: italic;">
                                        點擊「編輯翻譯」添加自定義翻譯
                                    </div>
                                `}
                            </div>
                        ` : ''}
                        
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <strong style="color: #667eea;">例句：</strong>
                            <div style="display: flex; gap: 8px;">
                                ${savedWord?.english && customExamples.length === 0 ? `
                                    <button type="button" onclick="fetchAndShowAPIExamples('${savedWord.english}', '${escapeJs(container.id)}')" 
                                            style="padding: 6px 12px; background: #f0f4ff; border: 1px solid #667eea; border-radius: 4px; cursor: pointer; color: #667eea; font-size: 0.85em;">
                                        🌐 聯網獲取例句
                                    </button>
                                ` : ''}
                                ${savedWord?.english ? `
                                    <button type="button" onclick="addCustomExample(${savedWord.id})" 
                                            style="padding: 6px 12px; background: #667eea; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 0.85em;">
                                        ➕ 添加例句
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                        
                        <ul class="example-sentence-list">
                            ${allExamples.map((item, index) => `
                                <li class="example-sentence-item" style="flex-direction: column; align-items: flex-start;">
                                    <div style="display: flex; align-items: center; gap: 8px; width: 100%; margin-bottom: 4px;">
                                        <span class="example-icon" style="cursor: pointer;" onclick="speakEnglish('${escapeJs(item.en)}')">🔊</span>
                                        <span class="example-sentence-text" style="flex: 1; font-weight: 500;">${escapeHtml(item.en)}</span>
                                        ${item.isCustom ? `
                                            <span style="font-size: 0.75em; background: #f0f4ff; color: #667eea; padding: 2px 6px; border-radius: 3px;">${item.fromAPI ? '網絡' : '自定義'}</span>
                                        ` : ''}
                                        ${!item.isCustom ? `
                                            <button type="button" 
                                                    onclick="event.stopPropagation(); saveAPISentenceAsDefault(${savedWord.id}, '${escapeJs(item.en)}', ${savedWord.customExamples ? savedWord.customExamples.length : 0})" 
                                                    style="padding: 2px 6px; background: #f0f4ff; border: 1px solid #667eea; border-radius: 3px; cursor: pointer; color: #667eea; font-size: 0.75em;">
                                                💾 設為預設
                                            </button>
                                        ` : ''}
                                    </div>
                                    ${item.zh ? `
                                        <div style="display: flex; align-items: center; gap: 8px; width: 100%; padding-left: 28px;" onclick="speakCantonese('${escapeJs(item.zh)}')">
                                            <span class="example-icon" style="font-size: 1em;">🔊</span>
                                            <span class="example-sentence-text" style="color: #666; font-size: 0.9em;">${escapeHtml(item.zh)}</span>
                                            ${item.isCustom ? `
                                                <button type="button" onclick="editExampleTranslation(${savedWord.id}, ${item.index})" 
                                                        style="padding: 2px 6px; background: none; border: 1px solid #ddd; border-radius: 3px; cursor: pointer; color: #999; font-size: 0.75em; margin-left: auto;">
                                                    ✏️ 編輯
                                                </button>
                                                <button type="button" onclick="deleteCustomExample(${savedWord.id}, ${item.index})" 
                                                        style="padding: 2px 6px; background: #f5576c; border: none; border-radius: 3px; cursor: pointer; color: white; font-size: 0.75em;">
                                                    🗑️ 刪除
                                                </button>
                                            ` : ''}
                                        </div>
                                    ` : ''}
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
                
                container.innerHTML = html;
            } else {
                container.innerHTML = '<div class="no-examples">😕 暫時沒有找到例句</div>';
            }
        }

        // Fetch and show API examples (for existing words)
        async function fetchAndShowAPIExamples(word, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            container.innerHTML = '<div class="loading-examples">🔄 正在從網絡獲取例句...</div>';
            
            const examples = await fetchExampleSentences(word);
            const savedWord = words.find(w => w.english === word);
            const customExamples = savedWord?.customExamples || [];
            
            displaySavedExamples(container, savedWord, customExamples, examples);
        }

        // Open calendar popup
        function openCalendar() {
            const popup = document.getElementById('calendarPopup');
            const overlay = document.getElementById('calendarOverlay');
            popup.classList.add('active');
            overlay.classList.add('active');
            
            // Re-render calendar to ensure proper sizing
            if (calendar) {
                setTimeout(() => {
                    calendar.render();
                }, 100);
            }
        }

        // Close calendar popup
        function closeCalendar() {
            const popup = document.getElementById('calendarPopup');
            const overlay = document.getElementById('calendarOverlay');
            popup.classList.remove('active');
            overlay.classList.remove('active');
        }
    </script>
</body>
</html>
